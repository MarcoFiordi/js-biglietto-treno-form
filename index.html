<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto</title>
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <h1>Calcola il prezzo del tuo biglietto</h1>

    <!-- FORM -->
    <form id="ticket-form">

        <!-- NOME -->
        <div>
            <label for="name">Nome e Cognome</label>
            <input type="text" id="name" name="name" placeholder="inserisci nome e cognome">
        </div>

        <!-- KM -->
        <div>
            <label for="km">Chilometri da percorrere</label>
            <input type="number" id="km" name="km" placeholder="inserisci km">
        </div>

        <!-- Fascia età -->
        <div>
            <label for="age-range">Fascia di età</label>
            <select name="age-range" id="age-range">
                <option value="">Seleziona</option>
                <option value="minorenne">Minorenne</option>
                <option value="maggiorenne">Maggiorenne</option>
                <option value="over65">Over 65</option>
            </select>
        </div>

        <!-- Bottoni -->
        <div>
            <button type="submit">Genera</button>
            <button type="reset">Annulla</button>
        </div>

    

    <!-- RISULTATO -->
    <div id="result">

    </div>


    </form>







    <script src="./script/script.js"></script>
</body>

</html>
